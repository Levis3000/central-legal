<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Central Legal — App Privacy &amp; Terms</title>
<style>
  :root {
    --ground: #F4F6F8;
    --surface: #FFFFFF;
    --ink: #1C2430;
    --muted: #5E6B7A;
    --hair: rgba(28, 36, 48, 0.12);
    --accent: #2F6FED;
    --sans: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #12161C;
      --surface: #1A212B;
      --ink: #E8EEF5;
      --muted: #9AA8B8;
      --hair: rgba(255, 255, 255, 0.12);
      --accent: #6B9BFF;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--ground);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 56px 24px 80px; }
  h1 { font-size: 28px; letter-spacing: -0.02em; margin: 0 0 8px; }
  .lead { color: var(--muted); margin: 0 0 36px; }
  .app {
    background: var(--surface);
    border: 1px solid var(--hair);
    border-radius: 14px;
    padding: 22px 24px;
    margin-bottom: 14px;
  }
  .app h2 { margin: 0 0 4px; font-size: 18px; }
  .app p { margin: 0 0 14px; color: var(--muted); font-size: 14.5px; }
  .links { display: flex; flex-wrap: wrap; gap: 8px; }
  .links a {
    text-decoration: none;
    color: var(--ink);
    font-weight: 600;
    font-size: 14px;
    padding: 8px 14px;
    border: 1px solid var(--hair);
    border-radius: 999px;
    background: var(--ground);
  }
  .links a:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Central Legal</h1>
    <p class="lead">Privacy policies and terms of service for our apps.</p>

    <div class="app">
      <h2>Falaah</h2>
      <p>Muslim prayer companion</p>
      <div class="links">
        <a href="falaah-privacy-policy.html">Privacy Policy</a>
        <a href="falaah-terms-of-service.html">Terms of Service</a>
        <a href="falaah-privacy-and-terms.html">Both (combined)</a>
      </div>
    </div>

    <div class="app">
      <h2>SnapTract</h2>
      <p>Receipt scanning &amp; expense reports</p>
      <div class="links">
        <a href="snaptract.html">SnapTract hub</a>
        <a href="snaptract-privacy-policy.html">Privacy Policy</a>
        <a href="snaptract-terms-of-service.html">Terms of Service</a>
        <a href="snaptract-eula.html">EULA</a>
        <a href="snaptract-contact.html">Contact us</a>
      </div>
    </div>
  </div>
</body>
</html>
