<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Towly — Legal</title>
<style>
  :root { --blue:#33CCFF; --navy:#23344D; --muted:#6C757D; --bg:#F8F9FA; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
         color:var(--navy); background:var(--bg); line-height:1.65; }
  .wrap { max-width:560px; margin:0 auto; padding:64px 22px 96px;
          display:flex; flex-direction:column; align-items:center; text-align:center; }
  .mark { width:72px; height:72px; border-radius:18px; background:var(--blue); display:flex;
          align-items:center; justify-content:center; color:#fff; font-size:34px; }
  h1 { font-size:32px; margin:22px 0 0; letter-spacing:-0.02em; }
  .lede { color:var(--muted); margin:10px 0 0; font-size:16px; }
  .links { display:flex; flex-direction:column; gap:12px; width:100%; max-width:360px; margin-top:38px; }
  .links a { font-size:16px; font-weight:700; text-decoration:none; color:var(--navy);
             padding:16px 20px; border-radius:14px; background:#fff; border:1px solid #e6e9ee; }
  .links a:hover { border-color:var(--blue); }
  footer { color:var(--muted); font-size:13px; margin-top:40px; }
  footer a { color:#0a9bc7; font-weight:600; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">🚗</div>
    <h1>Towly</h1>
    <p class="lede">Community map of predatory tow zones.</p>

    <nav class="links">
      <a href="towly-privacy-policy.html">Privacy Policy</a>
      <a href="towly-terms-of-service.html">Terms of Use</a>
    </nav>

    <footer>Questions? <a href="mailto:support@towly.app">support@towly.app</a></footer>
  </div>
</body>
</html>
