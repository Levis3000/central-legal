<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Towly — Legal</title>
<style>
  :root { --cream:#F6F1E7; --card:#FCFAF4; --ink:#33302B; --muted:#857D70; --blue:#6F9BB5; --line:#E7E0D2; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--cream); color:var(--ink); line-height:1.65;
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:64px 22px 96px;
          display:flex; flex-direction:column; align-items:center; text-align:center; }
  .logo { width:96px; height:96px; border-radius:22px; box-shadow:0 8px 24px rgba(51,48,43,.18); }
  h1 { font-size:32px; margin:22px 0 0; letter-spacing:-0.02em; }
  .lede { color:var(--muted); margin:10px 0 0; font-size:16px; }
  .links { display:flex; flex-direction:column; gap:12px; width:100%; max-width:360px; margin-top:38px; }
  .links a { font-size:16px; font-weight:700; text-decoration:none; color:var(--ink);
             padding:16px 20px; border-radius:14px; background:var(--card); border:1px solid var(--line); }
  .links a:hover { border-color:var(--blue); }
  footer { color:var(--muted); font-size:13px; margin-top:40px; }
  footer a { color:var(--blue); font-weight:600; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="towly-logo.png" alt="Towly logo" width="96" height="96">
    <h1>Towly</h1>
    <p class="lede">Community map of predatory tow zones.</p>
    <nav class="links">
      <a href="towly-privacy-policy.html">Privacy Policy</a>
      <a href="towly-terms-of-service.html">Terms of Service</a>
      <a href="towly-eula.html">EULA</a>
      <a href="towly-contact.html">Contact us</a>
    </nav>
    <footer>Questions? <a href="mailto:support@towly.app">support@towly.app</a></footer>
  </div>
</body>
</html>
