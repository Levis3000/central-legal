<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Towly — Contact Us</title>
<style>
  :root { --cream:#F6F1E7; --card:#FCFAF4; --ink:#33302B; --muted:#857D70; --blue:#6F9BB5; --red:#C0432F; --line:#E7E0D2; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--cream); color:var(--ink); line-height:1.6;
         font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:600px; margin:0 auto; padding:36px 22px 80px; }
  header { display:flex; align-items:center; gap:14px; margin-bottom:6px; }
  .logo { width:54px; height:54px; border-radius:14px; box-shadow:0 4px 12px rgba(51,48,43,.18); }
  .brand { font-size:22px; font-weight:700; }
  h1 { font-size:30px; margin:22px 0 4px; }
  p.lead { color:var(--muted); font-size:16px; margin-top:6px; }
  .nav a { color:var(--muted); font-size:13px; margin-right:14px; }
  label { display:block; font-size:14px; font-weight:600; margin:18px 0 6px; }
  input, textarea { width:100%; font-size:16px; font-family:inherit; color:var(--ink);
    background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  input:focus, textarea:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(111,155,181,.2); }
  textarea { min-height:140px; resize:vertical; }
  button { margin-top:22px; width:100%; font-size:17px; font-weight:600; color:#fff;
    background:var(--blue); border:none; border-radius:14px; padding:15px; cursor:pointer; }
  button:disabled { opacity:.6; cursor:default; }
  .status { margin-top:16px; font-size:15px; }
  .ok { color:#4f7a3a; } .err { color:var(--red); }
  .done { text-align:center; padding:40px 0; }
  .done .check { width:80px;height:80px;border-radius:50%;background:rgba(126,155,105,.18);
    display:flex;align-items:center;justify-content:center;font-size:38px;color:#5c7a45;margin:0 auto 16px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <img class="logo" src="towly-logo.png" alt="Towly logo">
      <span class="brand">Towly</span>
    </header>
    <div class="nav">
      <a href="towly-privacy-policy.html">Privacy Policy</a>
      <a href="towly-terms-of-service.html">Terms of Service</a>
      <a href="towly-eula.html">EULA</a>
    </div>

    <div id="form-view">
      <h1>Contact us</h1>
      <p class="lead">Questions, feedback, or a predatory-towing story? Send us a message and we'll get back to you.</p>

      <form id="contact-form">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" placeholder="Your name">

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="name@example.com" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="How can we help?" required></textarea>

        <button id="submit-btn" type="submit">Send message</button>
        <div id="status" class="status"></div>
      </form>
    </div>

    <div id="done-view" class="done" style="display:none;">
      <div class="check">✓</div>
      <h1>Thanks — we got it</h1>
      <p class="lead">Your message is on its way. We'll follow up by email if needed.</p>
    </div>
  </div>

  <script>
    // Towly Supabase project. The anon key is a PUBLIC key (it also ships in the
    // app); row-level security limits it to inserting contact messages only.
    const SUPABASE_URL = "https://xjxjssufxzqjlnvyjmbh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqeGpzc3VmeHpxamxudnlqbWJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2Nzc3MjksImV4cCI6MjA4NjI1MzcyOX0.Esw1v8LSgJpQPapmtNyNm-1fzdtmfz9IcqubZQw23Ko";

    const form = document.getElementById("contact-form");
    const btn = document.getElementById("submit-btn");
    const statusEl = document.getElementById("status");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      statusEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Sending…";

      const payload = {
        name: document.getElementById("name").value.trim() || null,
        email: document.getElementById("email").value.trim(),
        message: document.getElementById("message").value.trim(),
        source: "web"
      };

      try {
        const res = await fetch(SUPABASE_URL + "/rest/v1/contact_messages", {
          method: "POST",
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": "Bearer " + SUPABASE_ANON_KEY,
            "Content-Type": "application/json",
            "Content-Profile": "towly",   // target the towly schema
            "Prefer": "return=minimal"
          },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("Request failed (" + res.status + ")");
        document.getElementById("form-view").style.display = "none";
        document.getElementById("done-view").style.display = "block";
      } catch (err) {
        statusEl.className = "status err";
        statusEl.textContent = "Sorry, that didn't send. Please try again or email us directly.";
        btn.disabled = false;
        btn.textContent = "Send message";
      }
    });
  </script>
</body>
</html>
