<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SnapTract — Legal &amp; Support</title>
<link rel="icon" type="image/png" href="snaptract-icon.png">
<style>
  /* Soft-blue neumorphic theme — mirrors the SnapTract app. */
  :root{
    --bg:#C9E6F7; --card:#D8EEFB; --inset:#BDDDF1;
    --ink:#2B4B65; --soft:#6E90A8;
    --brand:#4FA3DD; --brand-deep:#3A88C6; --snap:#2F9BE8; --coral:#F5654C;
    --sh-d:#A6C6DE; --sh-l:#F4FBFF;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:560px;margin:0 auto;padding:64px 22px 96px;
    display:flex;flex-direction:column;align-items:center;text-align:center;}
  .logo{width:96px;height:96px;border-radius:24px;
    box-shadow:8px 8px 18px var(--sh-d),-8px -8px 18px var(--sh-l);}
  .mark{font-weight:800;font-size:34px;letter-spacing:-.02em;margin:22px 0 0;
    text-shadow:0 1px 0 var(--sh-l);}
  .mark .s{color:var(--snap)} .mark .t{color:var(--coral)}
  .lede{color:var(--soft);margin:10px 0 0;font-size:16px}
  .links{display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;margin-top:38px}
  .links a{font-size:16px;font-weight:700;text-decoration:none;color:var(--brand-deep);
    padding:16px 20px;border-radius:16px;background:var(--card);
    box-shadow:6px 6px 14px var(--sh-d),-6px -6px 14px var(--sh-l);transition:transform .08s}
  .links a:active{transform:translateY(1px)}
  footer{color:var(--soft);font-size:13px;margin-top:40px}
  footer a{color:var(--brand-deep);font-weight:600}
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="snaptract-icon.png" alt="SnapTract app icon" width="96" height="96">
    <h1 class="mark"><span class="s">Snap</span><span class="t">Tract</span></h1>
    <p class="lede">Scan receipts. Track spending.</p>

    <nav class="links">
      <a href="snaptract-terms-of-service.html">Terms of Service</a>
      <a href="snaptract-privacy-policy.html">Privacy Policy</a>
      <a href="snaptract-eula.html">EULA</a>
      <a href="snaptract-contact.html">Contact us</a>
    </nav>

    <footer>Questions? <a href="mailto:support@snaptract.app">support@snaptract.app</a></footer>
  </div>
</body>
</html>
